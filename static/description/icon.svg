<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6a49a0"/>
      <stop offset="1" stop-color="#3a2160"/>
    </linearGradient>
    <linearGradient id="mast" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a2c78"/>
      <stop offset="0.5" stop-color="#8f77bd"/>
      <stop offset="1" stop-color="#4a2c78"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1c1030" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- rounded purple background -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- newsletter sheet -->
  <g filter="url(#sh)" transform="rotate(-4 256 262)">
    <rect x="120" y="86" width="272" height="352" rx="16" fill="#ffffff"/>

    <!-- masthead bar -->
    <rect x="120" y="86" width="272" height="70" rx="16" fill="url(#mast)"/>
    <rect x="120" y="140" width="272" height="70" fill="url(#mast)" opacity="0"/>
    <!-- square off masthead bottom -->
    <rect x="120" y="120" width="272" height="36" fill="url(#mast)"/>
    <!-- gold rule under masthead -->
    <rect x="120" y="156" width="272" height="7" fill="#c9a227"/>

    <!-- masthead script mark -->
    <circle cx="163" cy="121" r="22" fill="none" stroke="#ffffff" stroke-width="4"/>
    <text x="163" y="130" text-anchor="middle" font-family="'Snell Roundhand','Brush Script MT',cursive"
          font-style="italic" font-size="26" fill="#ffffff">E</text>
    <text x="290" y="118" text-anchor="middle" font-family="Georgia, serif" font-weight="bold"
          font-size="30" letter-spacing="1" fill="#ffffff">NEWS</text>
    <text x="290" y="146" text-anchor="middle" font-family="Georgia, serif" font-weight="bold"
          font-size="22" letter-spacing="2" fill="#efe7fb">LETTER</text>

    <!-- body: left column text lines -->
    <g fill="#c9cad0">
      <rect x="140" y="188" width="112" height="9" rx="4"/>
      <rect x="140" y="206" width="112" height="9" rx="4"/>
      <rect x="140" y="224" width="112" height="9" rx="4"/>
      <rect x="140" y="242" width="96"  height="9" rx="4"/>
      <rect x="140" y="270" width="112" height="9" rx="4"/>
      <rect x="140" y="288" width="112" height="9" rx="4"/>
      <rect x="140" y="306" width="80"  height="9" rx="4"/>
    </g>

    <!-- right column: image block + lines -->
    <rect x="268" y="188" width="104" height="72" rx="6" fill="#e7dff5"/>
    <rect x="284" y="214" width="72" height="30" rx="4" fill="#b39ddb"/>
    <g fill="#c9cad0">
      <rect x="268" y="272" width="104" height="9" rx="4"/>
      <rect x="268" y="290" width="104" height="9" rx="4"/>
      <rect x="268" y="308" width="84"  height="9" rx="4"/>
    </g>

    <!-- purple section bar -->
    <rect x="140" y="332" width="232" height="20" rx="4" fill="#5b3b8c"/>

    <!-- two lower columns -->
    <g fill="#c9cad0">
      <rect x="140" y="364" width="108" height="8" rx="4"/>
      <rect x="140" y="380" width="108" height="8" rx="4"/>
      <rect x="140" y="396" width="88"  height="8" rx="4"/>
      <rect x="264" y="364" width="108" height="8" rx="4"/>
      <rect x="264" y="380" width="108" height="8" rx="4"/>
      <rect x="264" y="396" width="92"  height="8" rx="4"/>
    </g>
    <!-- column rule -->
    <rect x="255" y="362" width="2" height="46" fill="#d8d3de"/>
  </g>

  <!-- gold star badge (lodge accent) -->
  <g transform="translate(388 384)">
    <circle cx="0" cy="0" r="52" fill="#c9a227"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#ffffff" stroke-width="4"/>
    <path d="M0 -30 L8.8 -9.3 L31 -9.3 L13 4 L20 26 L0 12.5 L-20 26 L-13 4 L-31 -9.3 L-8.8 -9.3 Z"
          fill="#3f2566"/>
  </g>
</svg>
